<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="VMKMilk демо-магазин: плавающая корзина, умная шапка, quick view и управление количеством без бэкенда."
    />
    <title>VMKMilk — демо-магазин</title>
    <link rel="preconnect" href="https://vmkmilk.ru" crossorigin />
    <link rel="stylesheet" href="./styles.css" />
    <script defer src="./script.js"></script>
  </head>
  <body>
    <header id="smartHeader" class="smart-header">
      <div class="header-inner">
        <button id="menuBtn" class="icon-btn" type="button" aria-label="Открыть меню категорий">
          ☰ <span>Меню</span>
        </button>

        <label class="search-wrap" for="searchInput">
          <span aria-hidden="true">🔎</span>
          <input id="searchInput" type="search" placeholder="Поиск товаров" autocomplete="off" />
        </label>

        <button id="filtersBtn" class="icon-btn" type="button" aria-label="Открыть фильтры">
          ⛃ <span class="desktop-only">Фильтры</span>
        </button>
      </div>
    </header>

    <main class="container">
      <section class="catalog-head">
        <h1>Каталог VMKMilk</h1>
        <p id="resultCounter" class="result-counter"></p>
      </section>

      <section id="productGrid" class="product-grid" aria-live="polite"></section>
    </main>

    <button id="cartFab" class="cart-fab" type="button" aria-label="Открыть корзину">
      <span class="cart-fab__icon" aria-hidden="true">🛒</span>
      <span class="cart-fab__text">Корзина</span>
      <span id="cartFabCount" class="cart-fab__badge">0</span>
      <span id="cartFabSum" class="cart-fab__sum">0 ₽</span>
    </button>

    <dialog id="menuDialog" class="sheet sheet--small" aria-labelledby="menuTitle">
      <form method="dialog" class="sheet__scrim-close"><button aria-label="Закрыть меню"></button></form>
      <div class="sheet__content" role="dialog" aria-modal="true" aria-labelledby="menuTitle">
        <div class="sheet__header">
          <h2 id="menuTitle">Меню категорий</h2>
          <button type="button" class="icon-close" data-close="menu">✕</button>
        </div>
        <div id="menuCategories" class="menu-list"></div>
      </div>
    </dialog>

    <dialog id="filtersDialog" class="sheet sheet--small" aria-labelledby="filtersTitle">
      <form method="dialog" class="sheet__scrim-close"><button aria-label="Закрыть фильтры"></button></form>
      <div class="sheet__content" role="dialog" aria-modal="true" aria-labelledby="filtersTitle">
        <div class="sheet__header">
          <h2 id="filtersTitle">Фильтры</h2>
          <button type="button" class="icon-close" data-close="filters">✕</button>
        </div>
        <fieldset class="filter-group">
          <legend>Сортировка</legend>
          <label><input type="radio" name="sort" value="popular" checked /> Популярные</label>
          <label><input type="radio" name="sort" value="nameAsc" /> Название (А-Я)</label>
          <label><input type="radio" name="sort" value="nameDesc" /> Название (Я-А)</label>
          <label><input type="radio" name="sort" value="priceAsc" /> Сначала дешевле</label>
          <label><input type="radio" name="sort" value="priceDesc" /> Сначала дороже</label>
        </fieldset>
      </div>
    </dialog>

    <dialog id="cartDialog" class="sheet sheet--cart" aria-labelledby="cartTitle">
      <form method="dialog" class="sheet__scrim-close"><button aria-label="Закрыть корзину"></button></form>
      <div class="sheet__content" role="dialog" aria-modal="true" aria-labelledby="cartTitle">
        <div class="sheet__header">
          <h2 id="cartTitle">Корзина</h2>
          <button type="button" class="icon-close" data-close="cart">✕</button>
        </div>

        <div id="cartEmpty" class="empty-state">Добавьте товары из каталога ✨</div>
        <ul id="cartItems" class="cart-items"></ul>

        <div class="cart-summary">
          <div><span>Товаров:</span><strong id="cartTotalItems">0</strong></div>
          <div><span>Сумма:</span><strong id="cartTotalPrice">0 ₽</strong></div>
        </div>

        <button id="checkoutBtn" type="button">Оформить демо-заказ</button>

        <details class="demo-accordion">
          <summary>Ближайшие даты доставки</summary>
          <div id="dateChips" class="date-chips"></div>
        </details>

        <details class="demo-accordion">
          <summary>История покупок (демо)</summary>
          <ul id="historyList" class="history-list">
            <li class="empty-history">Пока нет демо-заказов</li>
          </ul>
        </details>
      </div>
    </dialog>

    <dialog id="quickViewDialog" class="sheet sheet--quick" aria-labelledby="quickTitle">
      <form method="dialog" class="sheet__scrim-close"><button aria-label="Закрыть карточку товара"></button></form>
      <article id="quickViewBody" class="sheet__content quick-view" role="dialog" aria-modal="true" aria-labelledby="quickTitle"></article>
    </dialog>

    <dialog id="checkoutDialog" class="sheet sheet--small" aria-labelledby="checkoutTitle">
      <div class="sheet__content">
        <h2 id="checkoutTitle">Заказ оформлен (демо)</h2>
        <p>Это визуальная симуляция оформления без бэкенда и оплаты.</p>
        <button id="closeDialog" type="button" class="secondary">Понятно</button>
      </div>
    </dialog>
  </body>
</html>
